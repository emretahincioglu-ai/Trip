<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>West Coast Run</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=DM+Sans:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:#25060e;color:#fff;overflow:hidden;}
.frame{position:relative;height:100%;max-width:460px;margin:0 auto;display:flex;flex-direction:column;background:#25060e;}

/* PICKER */
.picker{position:absolute;inset:0;z-index:30;background:#25060e;display:flex;flex-direction:column;justify-content:center;padding:40px 22px;transition:opacity .4s,transform .4s;}
.picker.gone{opacity:0;transform:scale(1.04);pointer-events:none;}
.picker .sub{text-align:center;font-size:11px;letter-spacing:.2em;color:#ffffff99;text-transform:uppercase;}
.picker h1{text-align:center;font-family:'Inter',-apple-system,system-ui,sans-serif;font-weight:900;letter-spacing:-.01em;font-size:48px;line-height:.92;margin:10px 0 6px;color:#fafafa;}
.picker .dates{text-align:center;font-family:'Space Mono',monospace;color:#ffffffaa;font-size:12px;margin-bottom:34px;}
.picker .who{text-align:center;font-size:11px;letter-spacing:.2em;color:#ffffff99;margin-bottom:16px;}
.people{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.pbtn{display:flex;align-items:center;gap:11px;background:#3a0e16;border:1px solid #00000018;border-radius:15px;padding:13px;cursor:pointer;color:#fff;text-align:left;transition:.16s;box-shadow:0 2px 8px #00000010;}
.pbtn:hover{transform:translateY(-2px);border-color:var(--c);}
.pbtn .pa{width:40px;height:40px;border-radius:50%;background:var(--c);color:#0e0f1a;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:14px;flex:none;}
.pbtn b{font-size:14px;font-weight:600;}

.stage{flex:1;position:relative;min-height:0;}
.fr{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:#25060e;}
.fr.on{display:block;}
.loader{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#25060e;z-index:5;}
.loader.on{display:flex;}
.loader .ring{width:34px;height:34px;border-radius:50%;border:3px solid #ffffff1c;border-top-color:#e30a17;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* native You panel */
.youpanel{position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto;}
.youpanel.on{display:flex;}
.youpage{padding:18px 16px 30px;}
.youhero{display:flex;align-items:center;gap:14px;background:#3a0e16;border:1px solid #0000000f;border-radius:18px;padding:18px;margin-bottom:18px;}
.youhero .ya{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:20px;color:#0e0f1a;}
.youhero .yn{font-family:'Inter',-apple-system,system-ui,sans-serif;font-weight:800;letter-spacing:-.01em;font-size:26px;}.youhero .ys{font-size:12px;color:#ffffff99;}
.sectitle{font-size:11px;letter-spacing:.2em;color:#ffffff88;margin:6px 2px 12px;}
.peoplelist{display:flex;flex-direction:column;gap:8px;}
.prow{display:flex;align-items:center;gap:12px;background:#3a0e16;border:1px solid #ffffff12;border-radius:14px;padding:12px;cursor:pointer;transition:.14s;}
.prow:hover{border-color:#fff5;}.prow.me{outline:2px solid currentColor;}
.prow .av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:12px;color:#0e0f1a;}
.prow .pn{flex:1;font-weight:600;color:#fff;}.prow .pv{font-size:11px;color:#ffffff80;}

/* BUDGET tab content */
.bhero{background:linear-gradient(135deg,#3a0e16 0%,#e30a17 200%);border:1px solid #e30a1755;border-radius:18px;padding:18px 20px;margin-bottom:18px;box-shadow:0 6px 20px #0008,inset 0 1px 0 #ffffff10;}
.bhero .blab{font-size:10px;letter-spacing:.18em;color:#ffffffa0;font-weight:700;}
.bhero .btot{font-family:'Inter',-apple-system,system-ui,sans-serif;font-weight:900;font-size:36px;letter-spacing:-.02em;margin:6px 0 4px;color:#fff;}
.bhero .bsub{font-size:12px;color:#ffffffc0;}
.bhero .bsub b{color:#e30a17;font-weight:700;}
.bbreak{display:flex;flex-direction:column;gap:9px;margin-bottom:18px;}
.bcat{background:#3a0e16;border:1px solid #ffffff14;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;}
.bcat .bci{width:36px;height:36px;border-radius:10px;background:#ffffff10;display:flex;align-items:center;justify-content:center;flex:none;}
.bcat .bci svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.bcat .bcm{flex:1;}
.bcat .bcm b{font-size:14px;display:block;font-weight:700;}
.bcat .bcm small{font-size:11.5px;color:#ffffffa0;display:block;margin-top:1px;}
.bcat .bcv{text-align:right;font-family:'Space Mono',monospace;font-weight:700;font-size:14px;}
.bcat .bcv .bpend{display:block;font-size:9px;color:#ffd166;letter-spacing:.06em;font-weight:700;margin-top:2px;}
.bppl{display:flex;flex-direction:column;gap:8px;}
.bprow{display:flex;align-items:center;gap:11px;background:#3a0e16;border:1px solid #ffffff12;border-radius:13px;padding:11px 13px;}
.bprow .bpav{width:30px;height:30px;border-radius:50%;color:#0e0f1a;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:11px;flex:none;}
.bprow .bpn{flex:1;font-size:13.5px;font-weight:600;}
.bprow .bpn small{display:block;font-size:11px;color:#ffffff90;font-weight:500;margin-top:1px;}
.bprow .bpamt{font-family:'Space Mono',monospace;font-weight:700;font-size:13px;text-align:right;}
.bprow .bpamt .bpstat{display:block;font-size:9px;letter-spacing:.06em;font-weight:700;margin-top:2px;}
.bprow .bpamt .bpstat.ok{color:#4ad6c4;}.bprow .bpamt .bpstat.pen{color:#ffd166;}

.tabs{flex:none;display:flex;background:#f5efef;border-top:2px solid #e30a17;padding:9px 4px calc(7px + env(safe-area-inset-bottom));box-shadow:0 -4px 18px #000a;position:relative;z-index:10;}
.tab{flex:1;background:none;border:none;color:#3a1418;padding:7px 2px 4px;font-size:9.5px;font-weight:600;letter-spacing:.02em;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s;}
.tab.on{color:#e30a17;}
.tab .ic{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.tab .ic svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke-width .2s;}
.tab.on .ic svg{stroke-width:2;}
</style>

<div class="frame">
  <div class="picker" id="picker">
    <div class="sub">NY · SF · PCH → LA</div>
    <h1>WEST COAST RUN</h1>
    <div class="dates">JUN 17 – 24, 2026</div>
    <div class="who">WHO'S RIDING?</div>
    <div class="people" id="people"></div>
  </div>

  <div class="stage">
    <div class="loader on" id="loader"><div class="ring"></div></div>
    <iframe class="fr on" id="fr-trip" src="section-trip.html"></iframe>
    <iframe class="fr" id="fr-matchday" data-src="section-trip.html?screen=gameday"></iframe>
    <iframe class="fr" id="fr-wc" data-src="section-worldcup.html"></iframe>
    <iframe class="fr" id="fr-games" data-src="section-games.html"></iframe>
    <div class="youpanel" id="fr-you">
      <div class="youpage">
        <div class="youhero"><span class="ya" id="youAv">EM</span><div><div class="yn" id="youName">Emre</div><div class="ys">Riding the West Coast Run</div></div></div>
        <div class="sectitle">YOUR BUDGET</div>
        <div class="bhero" id="bHero"></div>
        <div class="sectitle">BREAKDOWN</div>
        <div class="bbreak" id="bBreak"></div>
        <div class="sectitle">EVERYONE</div>
        <div class="bppl" id="bPeople"></div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" data-tab="trip"><span class="ic"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/><path d="M10 21v-7h4v7"/></svg></span>Home</button>
    <button class="tab" data-tab="wc"><span class="ic"><svg viewBox="0 0 24 24"><path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M7 6H4v2a3 3 0 0 0 3 3M17 6h3v2a3 3 0 0 1-3 3"/><path d="M9 21h6M12 14v7"/></svg></span>Scores</button>
    <button class="tab" data-tab="matchday"><span class="ic"><svg viewBox="0 0 24 24"><path d="M12 22c4 0 7-3 7-7 0-2.5-1.5-4-2.5-5.5-.8 1.5-2.5 1.5-2.5 0 0-2-2-4-2-4S5 9 5 14c0 4 3 8 7 8z"/></svg></span>Match Day</button>
    <button class="tab" data-tab="games"><span class="ic"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="11" rx="3.5"/><path d="M7 11v4M5 13h4"/><circle cx="15.5" cy="11.5" r="1"/><circle cx="17.5" cy="14.5" r="1"/></svg></span>Games</button>
    <button class="tab" data-tab="you"><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M7 15h3M16 15h2"/></svg></span>Budget</button>
  </div>
</div>

<script>
const ACC=["#e30a17","#ffb347","#ff4d8d","#4ad6c4","#7c8cff","#ffd447"];
const PEOPLE=[
 {id:0,name:"Emre",origin:"San Diego"},{id:1,name:"KD",origin:"Already in SF"},
 {id:2,name:"Ali",origin:"San Diego"},{id:3,name:"Ali K",origin:"San Diego"},
 {id:4,name:"Mekin",origin:"Chicago"},{id:5,name:"Kaan",origin:"Arizona"},
];
const inits=n=>n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
let ME=PEOPLE[0];

const peopleEl=document.getElementById('people');
PEOPLE.forEach(p=>{const b=document.createElement('button');b.className='pbtn';b.style.setProperty('--c',ACC[p.id%6]);
 b.innerHTML=`<span class="pa">${inits(p.name)}</span><b>${p.name}</b>`;b.onclick=()=>pick(p.id);peopleEl.appendChild(b);});
function pick(id){ME=PEOPLE[id];syncRider();document.getElementById('picker').classList.add('gone');reloadTrip();}
function syncRider(){
 document.getElementById('youAv').textContent=inits(ME.name);document.getElementById('youAv').style.background=ACC[ME.id%6];
 document.getElementById('youName').textContent=ME.name;
 buildBudget();
}

/* ---- BUDGET DATA ---- */
const HOTELS=[
 {name:"Residence Inn Sunnyvale",dates:"Jun 19–20",total:370.76,booked:true},
 {name:"Portola Hotel Monterey",dates:"Jun 20–21",total:634.75,booked:true},
 {name:"Santa Barbara hotel",dates:"Jun 21–22",total:0,booked:false},
 {name:"Santa Monica hotel",dates:"Jun 22–23",total:0,booked:false},
];
const CARS=[
 {name:"2× Jeep Wrangler",dates:"Jun 20–22",total:807.56,booked:true},
 {name:"Full-size SUV",dates:"Jun 22–23",total:179.82,booked:true},
];
const FLIGHTS_PRICE={0:null,1:null,2:null,3:null,4:null,5:null};
const money=n=>"$"+(Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:n%1?2:0,maximumFractionDigits:2});

function personTotals(meId){
 const hotelShare=HOTELS.reduce((s,h)=>s+(h.booked?h.total:0),0)/PEOPLE.length;
 const hotelPending=HOTELS.reduce((s,h)=>s+(!h.booked?1:0),0);
 const carsShare=CARS.reduce((s,c)=>s+(c.booked?c.total:0),0)/PEOPLE.length;
 const flightPrice=FLIGHTS_PRICE[meId];
 const flightStatus=flightPrice==null?'pending':'locked';
 return{hotelShare,hotelPending,carsShare,flightPrice,flightStatus,knownTotal:hotelShare+carsShare+(flightPrice||0)};
}

function buildBudget(){
 const t=personTotals(ME.id);
 const hero=document.getElementById('bHero');
 if(hero){
  const pendingCount=t.hotelPending+(t.flightStatus==='pending'?1:0);
  hero.innerHTML=`<div class="blab">YOUR RUNNING TOTAL · ${ME.name.toUpperCase()}</div>
   <div class="btot">${money(t.knownTotal)}</div>
   <div class="bsub">${t.knownTotal>0?'locked in':'no prices yet'}${pendingCount?` · <b>${pendingCount} pending</b>`:''}</div>`;
 }
 const br=document.getElementById('bBreak');
 if(br){
  const totalHotelPending=HOTELS.filter(h=>!h.booked).length;
  br.innerHTML=`
   <div class="bcat">
    <div class="bci"><svg viewBox="0 0 24 24"><path d="M3 17v-5a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3v5M3 17h18M3 17v3M21 17v3M7 12h4"/></svg></div>
    <div class="bcm"><b>Hotels</b><small>${HOTELS.filter(h=>h.booked).length} booked · ${totalHotelPending} pending · split ÷6</small></div>
    <div class="bcv">${money(t.hotelShare)}${totalHotelPending?`<span class="bpend">+${totalHotelPending} TBD</span>`:''}</div>
   </div>
   <div class="bcat">
    <div class="bci"><svg viewBox="0 0 24 24"><path d="M5 17h14M5 17v3M19 17v3M5 17l1.5-5h11L19 17M7 14h10M7 17a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zM20 17a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/></svg></div>
    <div class="bcm"><b>Cars</b><small>2 Wranglers + 1 SUV · split ÷6</small></div>
    <div class="bcv">${money(t.carsShare)}</div>
   </div>
   <div class="bcat">
    <div class="bci"><svg viewBox="0 0 24 24"><path d="M3 12l5 1.5 4-7 2 1-2 7 5 1.5L20 21l-9-3-7 3 1-5 4-2-6-2z"/></svg></div>
    <div class="bcm"><b>Flight</b><small>${ME.origin} → SF · your legs</small></div>
    <div class="bcv">${t.flightPrice!=null?money(t.flightPrice):'—'}${t.flightStatus==='pending'?`<span class="bpend">ADD PRICE</span>`:''}</div>
   </div>
   <div class="bcat">
    <div class="bci"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg></div>
    <div class="bcm"><b>Reservations</b><small>Dinners & bookings · ÷n</small></div>
    <div class="bcv">$0<span class="bpend">SOON</span></div>
   </div>`;
 }
 const pp=document.getElementById('bPeople');
 if(pp){
  pp.innerHTML=PEOPLE.map(p=>{const pt=personTotals(p.id);const isMe=p.id===ME.id;
   return `<div class="bprow">
    <span class="bpav" style="background:${ACC[p.id%6]}">${inits(p.name)}</span>
    <div class="bpn">${p.name}${isMe?' (you)':''}<small>${p.origin}</small></div>
    <div class="bpamt">${money(pt.knownTotal)}<span class="bpstat ${pt.flightStatus==='pending'||pt.hotelPending?'pen':'ok'}">${pt.flightStatus==='pending'?'FLIGHT TBD':pt.hotelPending?'HOTELS TBD':'LOCKED'}</span></div>
   </div>`;}).join("");
 }
}

function reloadTrip(){
 document.getElementById('fr-trip').src='section-trip.html?rider='+ME.id;
 const fm=document.getElementById('fr-matchday');
 if(fm.src && fm.src!=='about:blank') fm.src='section-trip.html?rider='+ME.id+'&screen=gameday';
}
const loaderEl=document.getElementById('loader');
const IFRAME_KEYS=['trip','matchday','wc','games'];
IFRAME_KEYS.forEach(k=>{const f=document.getElementById('fr-'+k);f.addEventListener('load',()=>{if(f.classList.contains('on'))loaderEl.classList.remove('on');});});
function showTab(id){
 document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===id));
 const isFrame=IFRAME_KEYS.includes(id);
 IFRAME_KEYS.forEach(k=>{const f=document.getElementById('fr-'+k);f.classList.toggle('on',k===id);
   if(k===id&&!f.src&&f.dataset.src){loaderEl.classList.add('on');f.src=f.dataset.src;}});
 document.getElementById('fr-you').classList.toggle('on',id==='you');
 if(!isFrame)loaderEl.classList.remove('on');
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>showTab(t.dataset.tab));
document.getElementById('fr-trip').src='section-trip.html?rider=0';
syncRider();
</script>
