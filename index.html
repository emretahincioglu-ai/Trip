<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>World Cup Trip</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=DM+Sans:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:#25060e;color:#fff;overflow:hidden;}
.frame{position:relative;height:100%;max-width:460px;margin:0 auto;display:flex;flex-direction:column;background:#25060e;}

/* PICKER */
.picker{position:absolute;inset:0;z-index:30;background:#25060e;display:flex;flex-direction:column;justify-content:center;padding:40px 22px;transition:opacity .4s,transform .4s;}
.picker.gone{opacity:0;transform:scale(1.04);pointer-events:none;}
.picker .sub{text-align:center;font-size:11px;letter-spacing:.2em;color:#ffffff99;text-transform:uppercase;}
.picker h1{text-align:center;font-family:'Inter',-apple-system,system-ui,sans-serif;font-weight:900;letter-spacing:-.01em;font-size:48px;line-height:.92;margin:10px 0 6px;color:#fafafa;}
.picker .dates{text-align:center;font-family:'Space Mono',monospace;color:#ffffffaa;font-size:12px;margin-bottom:34px;}
.picker .who{text-align:center;font-size:11px;letter-spacing:.2em;color:#ffffff99;margin-bottom:16px;}
.people{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.pbtn{display:flex;align-items:center;gap:11px;background:#3a0e16;border:1px solid #00000018;border-radius:15px;padding:13px;cursor:pointer;color:#fff;text-align:left;transition:.16s;box-shadow:0 2px 8px #00000010;}
.pbtn:hover{transform:translateY(-2px);border-color:var(--c);}
.pbtn .pa{width:40px;height:40px;border-radius:50%;background:var(--c);color:#0e0f1a;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:14px;flex:none;}
.pbtn b{font-size:14px;font-weight:600;}

.stage{flex:1;position:relative;min-height:0;}
.fr{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:#25060e;}
.fr.on{display:block;}
.loader{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#25060e;z-index:5;}
.loader.on{display:flex;}
.loader .ring{width:34px;height:34px;border-radius:50%;border:3px solid #ffffff1c;border-top-color:#e30a17;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* games coming-soon panel */
.gamespanel{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:40px 22px;}
.gamespanel.on{display:flex;}
.gp-card{max-width:340px;text-align:center;background:linear-gradient(160deg,#3a0e16,#28141a 70%,#1f0f12);border:1px solid #e30a1788;border-radius:22px;padding:34px 26px 30px;box-shadow:0 18px 50px #000a,inset 0 1px 0 #ffffff14;}
.gp-icon{width:72px;height:72px;border-radius:20px;background:#e30a1722;border:1px solid #e30a1755;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.gp-icon svg{width:38px;height:38px;}
.gp-h{font-family:'Inter',sans-serif;font-weight:900;font-size:24px;letter-spacing:-.02em;margin-bottom:10px;}
.gp-s{font-size:13px;color:#ffffffc0;line-height:1.5;margin-bottom:18px;}
.gp-meta{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;font-weight:800;color:#e30a17;background:#e30a1722;padding:6px 12px;border-radius:999px;}

/* native You panel */
.youpanel{position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto;}
.youpanel.on{display:flex;}
.youpage{padding:18px 16px 30px;}
.youhero{display:flex;align-items:center;gap:14px;background:#3a0e16;border:1px solid #0000000f;border-radius:18px;padding:18px;margin-bottom:18px;}
.youhero .ya{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:20px;color:#0e0f1a;}
.youhero .yn{font-family:'Inter',-apple-system,system-ui,sans-serif;font-weight:800;letter-spacing:-.01em;font-size:26px;}.youhero .ys{font-size:12px;color:#ffffff99;}
.sectitle{font-size:11px;letter-spacing:.2em;color:#ffffff88;margin:6px 2px 12px;}
.peoplelist{display:flex;flex-direction:column;gap:8px;}
.prow{display:flex;align-items:center;gap:12px;background:#3a0e16;border:1px solid #ffffff12;border-radius:14px;padding:12px;cursor:pointer;transition:.14s;}
.prow:hover{border-color:#fff5;}.prow.me{outline:2px solid currentColor;}
.prow .av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:12px;color:#0e0f1a;}
.prow .pn{flex:1;font-weight:600;color:#fff;}.prow .pv{font-size:11px;color:#ffffff80;}

/* BUDGET tab content - WOW edition */
.bhero{position:relative;background:linear-gradient(135deg,#3a0e16 0%,#5a0c14 60%,#e30a17 180%);border:1px solid #e30a1799;border-radius:20px;padding:20px 22px 18px;margin-bottom:16px;overflow:hidden;box-shadow:0 10px 30px #0009,inset 0 1px 0 #ffffff14;}
.bhero::before{content:'';position:absolute;top:-40%;right:-20%;width:200px;height:200px;background:radial-gradient(circle,#e30a1733 0%,transparent 70%);pointer-events:none;}
.bhero .blab{font-size:10px;letter-spacing:.22em;color:#ffffffb0;font-weight:800;position:relative;z-index:1;}
.bhero .btot{font-family:'Inter',-apple-system,system-ui,sans-serif;font-weight:900;font-size:44px;letter-spacing:-.025em;margin:6px 0 8px;color:#fff;position:relative;z-index:1;line-height:1;}
.bhero .btot .bcent{font-size:24px;color:#ffffffcc;}
.bhero .bbar{display:flex;height:9px;border-radius:6px;overflow:hidden;background:#ffffff10;margin:10px 0 9px;position:relative;z-index:1;box-shadow:inset 0 1px 2px #0004;}
.bhero .bseg{height:100%;transition:width .6s ease;}
.bhero .bsub{font-size:12px;color:#ffffffd0;position:relative;z-index:1;display:flex;align-items:center;gap:8px;}
.bhero .bsub b{color:#fff;font-weight:800;}
.bhero .bdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#e30a17;animation:bpulse 1.4s infinite;}
@keyframes bpulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.bbreak{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.bcat{background:#3a0e16;border:1px solid #ffffff14;border-radius:14px;padding:14px;display:flex;align-items:center;gap:13px;cursor:pointer;transition:transform .12s,border-color .15s,box-shadow .15s;position:relative;}
.bcat:hover{border-color:#e30a1788;}
.bcat:active{transform:scale(.985);}
.bcat.tappable::after{content:'›';position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#ffffff66;font-size:22px;font-weight:300;}
.bcat .bci{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#e30a1722,#e30a1708);border:1px solid #e30a1733;display:flex;align-items:center;justify-content:center;flex:none;}
.bcat .bci svg{width:20px;height:20px;stroke:#e30a17;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.bcat .bcm{flex:1;min-width:0;}
.bcat .bcm b{font-size:14.5px;display:block;font-weight:700;}
.bcat .bcm small{font-size:11.5px;color:#ffffffa0;display:block;margin-top:2px;}
.bcat .bcm .bcbar{display:block;margin-top:7px;height:4px;background:#ffffff10;border-radius:3px;overflow:hidden;}
.bcat .bcm .bcbar i{display:block;height:100%;background:#e30a17;border-radius:3px;transition:width .6s ease;}
.bcat .bcv{text-align:right;font-family:'Space Mono',monospace;font-weight:700;font-size:14.5px;padding-right:14px;}
.bcat .bcv .bpend{display:block;font-size:9px;color:#ffd166;letter-spacing:.06em;font-weight:700;margin-top:2px;}
/* Budget detail drill-in */
.bdback{display:inline-flex;align-items:center;gap:6px;color:#e30a17;font-size:13px;font-weight:700;margin:0 0 14px;cursor:pointer;letter-spacing:.02em;}
.bdback:hover{color:#ff4d5a;}
.bdh{font-size:11px;letter-spacing:.22em;color:#ffffff88;margin:2px 2px 8px;font-weight:800;}
.bdhead{background:linear-gradient(135deg,#3a0e16,#28141a);border:1px solid #e30a1755;border-radius:16px;padding:16px 18px;margin-bottom:16px;}
.bdhead .l{font-size:10px;letter-spacing:.2em;color:#ffffffa0;font-weight:800;}
.bdhead .t{font-family:'Inter',sans-serif;font-weight:900;font-size:30px;letter-spacing:-.02em;margin:4px 0 2px;}
.bdhead .s{font-size:12px;color:#ffffffb0;}
.bditem{background:#3a0e16;border:1px solid #ffffff14;border-radius:14px;padding:14px 16px;margin-bottom:8px;}
.bditem .name{font-size:14px;font-weight:700;display:block;}
.bditem .meta{font-size:11.5px;color:#ffffff90;margin-top:3px;display:block;}
.bditem .nums{display:flex;justify-content:space-between;align-items:flex-end;margin-top:10px;padding-top:10px;border-top:1px solid #ffffff10;}
.bditem .nums .nl{font-size:10px;letter-spacing:.14em;color:#ffffff80;font-weight:700;}
.bditem .nums .nv{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;}
.bditem .nums .your .nv{color:#ffd166;font-size:16px;}
/* By City rows */
.bcity{display:flex;align-items:center;background:#3a0e16;border:1px solid #ffffff14;border-radius:14px;padding:13px 16px;margin-bottom:8px;gap:12px;}
.bcity-l{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;}
.bcity-d{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.12em;color:#ffffff90;font-weight:700;text-transform:uppercase;}
.bcity-n{font-size:14.5px;font-weight:800;letter-spacing:-.005em;display:flex;align-items:center;gap:8px;}
.bcity-b{display:inline-block;font-size:8.5px;background:#e30a17;color:#fff;padding:2px 6px;border-radius:4px;letter-spacing:.1em;font-weight:800;}
.bcity-s{font-size:11.5px;color:#ffffff90;margin-top:2px;}
.bcity-bar{display:block;margin-top:7px;height:3px;background:#ffffff10;border-radius:2px;overflow:hidden;}
.bcity-bar i{display:block;height:100%;background:#e30a17;border-radius:2px;}
.bcity-v{font-family:'Space Mono',monospace;font-weight:700;font-size:14.5px;color:#fafafa;text-align:right;flex:none;}
.bppl{display:flex;flex-direction:column;gap:8px;}
.bprow{display:flex;align-items:center;gap:11px;background:#3a0e16;border:1px solid #ffffff12;border-radius:13px;padding:11px 13px;}
.bprow .bpav{width:30px;height:30px;border-radius:50%;color:#0e0f1a;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;font-size:11px;flex:none;}
.bprow .bpn{flex:1;font-size:13.5px;font-weight:600;}
.bprow .bpn small{display:block;font-size:11px;color:#ffffff90;font-weight:500;margin-top:1px;}
.bprow .bpamt{font-family:'Space Mono',monospace;font-weight:700;font-size:13px;text-align:right;}
.bprow .bpamt .bpstat{display:block;font-size:9px;letter-spacing:.06em;font-weight:700;margin-top:2px;}
.bprow .bpamt .bpstat.ok{color:#4ad6c4;}.bprow .bpamt .bpstat.pen{color:#ffd166;}

/* Splitwise transaction rows - text only, no avatars */
.swtx{display:flex;align-items:center;justify-content:space-between;background:#3a0e16;border:1px solid #e30a1755;border-radius:13px;padding:13px 16px;margin-bottom:8px;}
.swtx-r b{font-size:14px;font-weight:700;display:block;}
.swtx-r small{display:block;font-size:11px;color:#ffffff80;margin-top:2px;letter-spacing:.02em;}
.swtx-ar{color:#e30a17;font-weight:700;margin:0 4px;}
.swtx-amt{font-family:'Space Mono',monospace;font-weight:700;font-size:15px;color:#fafafa;}
.swhd{font-size:11px;letter-spacing:.2em;color:#ffffff88;margin:22px 2px 10px;font-weight:700;}
.swppl{display:flex;flex-direction:column;gap:6px;}
.swp{display:flex;align-items:center;justify-content:space-between;background:#3a0e16;border:1px solid #ffffff10;border-radius:12px;padding:11px 14px;}
.swp-l b{font-size:13.5px;font-weight:700;}
.swp-l small{display:block;font-size:10.5px;color:#ffffff80;letter-spacing:.04em;margin-top:1px;text-transform:uppercase;}
.swp-you{font-size:9px;background:#e30a17;color:#fff;padding:2px 6px;border-radius:4px;letter-spacing:.08em;font-weight:700;vertical-align:middle;margin-left:6px;}
.swp-amt{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;}
/* Add-expense floating button + modal */
.bplus{position:fixed;right:18px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:25;width:54px;height:54px;border-radius:50%;background:#e30a17;border:none;color:#fff;font-size:30px;font-weight:300;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 22px #e30a1766,0 4px 12px #000a;transition:transform .15s;}
.bplus:active{transform:scale(.92);}
.bplus.gone{display:none;}
.bsheet{position:fixed;inset:0;z-index:50;background:#000a;backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;}
.bsheet.on{display:flex;animation:bsheetin .25s ease;}
@keyframes bsheetin{from{background:transparent;}to{background:#000a;}}
.bsheet-card{width:100%;max-width:460px;background:#1f0f12;border-top-left-radius:24px;border-top-right-radius:24px;border:1px solid #e30a1755;border-bottom:none;padding:22px 22px calc(28px + env(safe-area-inset-bottom));animation:bslide .3s cubic-bezier(.22,1,.36,1);}
@keyframes bslide{from{transform:translateY(100%);}to{transform:none;}}
.bsheet-h{font-family:'Inter',sans-serif;font-weight:900;font-size:22px;letter-spacing:-.02em;margin-bottom:6px;}
.bsheet-s{font-size:12.5px;color:#ffffffa0;margin-bottom:18px;}
.bsheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.bsheet-cat{background:#3a0e16;border:1px solid #ffffff14;border-radius:14px;padding:16px 14px;cursor:pointer;display:flex;flex-direction:column;align-items:flex-start;gap:8px;transition:.15s;}
.bsheet-cat:hover{border-color:#e30a1788;transform:translateY(-1px);}
.bsheet-cat svg{width:24px;height:24px;stroke:#e30a17;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.bsheet-cat b{font-size:14px;font-weight:700;}
.bsheet-cat small{font-size:11px;color:#ffffff90;}
.bsheet-input{display:block;width:100%;background:#3a0e16;border:1px solid #ffffff20;border-radius:12px;padding:13px 14px;color:#fff;font-family:inherit;font-size:14px;margin-bottom:10px;}
.bsheet-input::placeholder{color:#ffffff60;}
.bsheet-input:focus{outline:none;border-color:#e30a17;}
.bsheet-actions{display:flex;gap:10px;margin-top:6px;}
.bsheet-btn{flex:1;background:none;border:1px solid #ffffff22;color:#fff;font-family:inherit;font-weight:700;font-size:14px;padding:13px;border-radius:12px;cursor:pointer;}
.bsheet-btn.prim{background:#e30a17;border-color:#e30a17;}
.bsheet-btn:disabled{opacity:.4;cursor:not-allowed;}
/* custom expense row inside breakdown */
.bcustom{display:flex;align-items:center;background:#3a0e16;border:1px dashed #e30a1788;border-radius:14px;padding:13px 16px;margin-bottom:8px;gap:13px;}
.bcustom .bci{width:36px;height:36px;border-radius:10px;background:#e30a1722;border:1px solid #e30a1755;display:flex;align-items:center;justify-content:center;flex:none;}
.bcustom .bci svg{width:18px;height:18px;stroke:#e30a17;fill:none;stroke-width:1.7;}
.bcustom .bcm{flex:1;min-width:0;}
.bcustom .bcm b{display:block;font-size:14px;font-weight:700;}
.bcustom .bcm small{display:block;font-size:11.5px;color:#ffffffa0;margin-top:2px;}
.bcustom .bcv{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;}
.bcustom .bx{margin-left:8px;background:none;border:none;color:#ffffff66;cursor:pointer;font-size:18px;padding:4px 8px;}
.bcustom .bx:hover{color:#e30a17;}
.bview{display:flex;gap:6px;background:#ffffff0c;border:1px solid #ffffff14;border-radius:999px;padding:4px;margin-bottom:14px;}
.bvt{flex:1;background:none;border:none;color:#ffffff80;font-family:inherit;font-size:12px;font-weight:700;padding:9px 8px;border-radius:999px;cursor:pointer;transition:.2s;letter-spacing:.02em;}
.bvt.on{background:#e30a17;color:#fff;}
.bcat .bci.flame{background:#e30a1722;}

.tabs{flex:none;display:flex;background:#f5efef;border-top:2px solid #e30a17;padding:9px 4px calc(7px + env(safe-area-inset-bottom));box-shadow:0 -4px 18px #000a;position:relative;z-index:10;}
.tab{flex:1;background:none;border:none;color:#3a1418;padding:7px 2px 4px;font-size:9.5px;font-weight:600;letter-spacing:.02em;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s;}
.tab.on{color:#e30a17;}
.tab .ic{width:22px;height:22px;display:flex;align-items:center;justify-content:center;}
.tab .ic svg{width:100%;height:100%;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;transition:stroke-width .2s;}
.tab.on .ic svg{stroke-width:2;}
</style>

<div class="frame">
  <div class="picker" id="picker">
    <div class="sub">NY · SF · PCH → LA</div>
    <h1>WORLD CUP TRIP</h1>
    <div class="dates">JUN 17 – 24, 2026</div>
    <div class="who">WHO'S RIDING?</div>
    <div class="people" id="people"></div>
  </div>

  <div class="stage">
    <div class="loader on" id="loader"><div class="ring"></div></div>
    <iframe class="fr on" id="fr-trip"></iframe>
    <iframe class="fr" id="fr-matchday" data-src="section-trip.html?screen=gameday"></iframe>
    <iframe class="fr" id="fr-wc" data-src="section-worldcup.html"></iframe>
    <div class="gamespanel" id="fr-games-soon">
      <div class="gp-card">
       <div class="gp-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#e30a17" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="11" rx="3.5"/><path d="M7 11v4M5 13h4"/><circle cx="15.5" cy="11.5" r="1.2" fill="#e30a17"/><circle cx="17.5" cy="14.5" r="1.2" fill="#e30a17"/></svg></div>
       <div class="gp-h">Games — coming soon</div>
       <div class="gp-s">Panini stickers, Bingo, Score Predictions, Bracket Challenge — all dropping before Türkiye vs Paraguay kicks off.</div>
       <div class="gp-meta">Drops before Jun 19</div>
      </div>
     </div>
    <div class="youpanel" id="fr-you">
      <div class="youpage">
        <div class="youhero"><span class="ya" id="youAv">EM</span><div><div class="yn" id="youName">Emre</div><div class="ys">Riding the World Cup Trip</div></div></div>
        <div class="bview">
          <button class="bvt on" id="bvBudget" onclick="setBView('budget')">Budget</button>
          <button class="bvt" id="bvSplit" onclick="setBView('split')">Splitwise</button>
        </div>
        <div id="bHero" class="bhero"></div>
        <div class="sectitle" id="bSect1"></div>
        <div id="bBreak" class="bbreak"></div>
       </div>
       <button class="bplus gone" id="bplus" onclick="openAddSheet()" aria-label="Add expense">+</button>
       <div class="bsheet" id="bsheet">
        <div class="bsheet-card" id="bsheet-card">
         <div class="bsheet-h">Add an expense</div>
         <div class="bsheet-s" id="bsheet-sub">Pick a category</div>
         <div id="bsheet-body"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" data-tab="trip"><span class="ic"><svg viewBox="0 0 24 24"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V10"/><path d="M10 21v-7h4v7"/></svg></span>Home</button>
    <button class="tab" data-tab="wc"><span class="ic"><svg viewBox="0 0 24 24"><path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M7 6H4v2a3 3 0 0 0 3 3M17 6h3v2a3 3 0 0 1-3 3"/><path d="M9 21h6M12 14v7"/></svg></span>Scores</button>
    <button class="tab" data-tab="matchday"><span class="ic"><svg viewBox="0 0 24 24"><path d="M12 22c4 0 7-3 7-7 0-2.5-1.5-4-2.5-5.5-.8 1.5-2.5 1.5-2.5 0 0-2-2-4-2-4S5 9 5 14c0 4 3 8 7 8z"/></svg></span>Match Day</button>
    <button class="tab" data-tab="games"><span class="ic"><svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="11" rx="3.5"/><path d="M7 11v4M5 13h4"/><circle cx="15.5" cy="11.5" r="1"/><circle cx="17.5" cy="14.5" r="1"/></svg></span>Games</button>
    <button class="tab" data-tab="you"><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M7 15h3M16 15h2"/></svg></span>Budget</button>
  </div>
</div>

<script>
const ACC=["#e30a17","#ffb347","#ff4d8d","#4ad6c4","#7c8cff","#ffd447"];
const PEOPLE=[
 {id:0,name:"Emre",origin:"San Diego"},{id:1,name:"KD",origin:"Already in SF"},
 {id:2,name:"Ali",origin:"San Diego"},{id:3,name:"Ali K",origin:"San Diego"},
 {id:4,name:"Mekin",origin:"Chicago"},{id:5,name:"Kaan",origin:"Arizona"},
];
const inits=n=>n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
let ME=PEOPLE[0];

];

/* Per-person hotel list (used both for total + detail screen) */
function personHotels(name){
 const list=[];
 const perNight=SD_TOTAL/SD_NIGHTS;
 if(name==="Kaan"){
  const sd=(perNight*SD_KAAN_NIGHTS)/4;
  list.push({name:"San Diego (12 - 15)",sub:`3 nights · split /4 with the early crew`,total:perNight*SD_KAAN_NIGHTS,share:sd,note:"your share"});
 } else if(SD_FULL.includes(name)){
  const sd1=(perNight*SD_KAAN_NIGHTS)/4;
  const sd2=(perNight*(SD_NIGHTS-SD_KAAN_NIGHTS))/3;
  list.push({name:"San Diego (12 - 17)",sub:`5 nights · 3 split /4, 2 split /3`,total:SD_TOTAL,share:sd1+sd2,note:"your share"});
 }
 HOTELS_SHARED.forEach(h=>list.push({name:h.name,sub:"split /6 across the squad",total:h.total,share:h.total/6,note:"your share"}));
 return list;
}
function personByCity(name){
 const list=[];
 const perNight=SD_TOTAL/SD_NIGHTS;
 if(name==="Kaan"){
  list.push({name:"San Diego",dates:"Jun 12 - 15",amt:(perNight*SD_KAAN_NIGHTS)/4,note:"3 nights · early crew"});
 } else if(SD_FULL.includes(name)){
  const sd=(perNight*SD_KAAN_NIGHTS)/4+(perNight*(SD_NIGHTS-SD_KAAN_NIGHTS))/3;
  list.push({name:"San Diego",dates:"Jun 12 - 17",amt:sd,note:"5 nights · pre-trip"});
 }
 list.push({name:"San Francisco",dates:"Jun 17 - 19",amt:HOTELS_SHARED[0].total/6,note:"Sure Stay · split /6"});
 const sc=HOTELS_SHARED[1].total/6;
 const ticket=TICKETS[name]||0;
 list.push({name:"Santa Clara",dates:"Jun 19 - 20",amt:sc+ticket,note:"Residence Inn + match ticket",badge:"MATCH"});
 list.push({name:"Carmel-by-the-Sea",dates:"Jun 20 - 21",amt:HOTELS_SHARED[2].total/6,note:"Portola · split /6"});
 const sb=HOTELS_SHARED[3].total/6;
 const transport=TRANSPORT.reduce((s,t)=>s+t.total,0)/6;
 list.push({name:"Santa Barbara",dates:"Jun 21 - 22",amt:sb+transport,note:"Airbnb + Wranglers"});
 return list;
}
function personProjected(name){
 const breakdown=[];let total=0;
 const hotels=personHotels(name);
 const hotelsTotal=hotels.reduce((s,h)=>s+h.share,0);
 if(hotelsTotal>0){
  total+=hotelsTotal;
  breakdown.push({cat:"Hotels", note:`${hotels.length} stays · tap for breakdown`, amt:hotelsTotal, status:"booked", id:"hotels", drill:true});
 }
 const transport=TRANSPORT.reduce((s,t)=>s+t.total,0)/6;
 total+=transport;
 breakdown.push({cat:"Transportation", note:"2 Wranglers · tap for breakdown", amt:transport, status:"booked", id:"transport", drill:true});
 const t=TICKETS[name]||0;
 total+=t;
 breakdown.push({cat:"Match Ticket", note:"your Türkiye vs Paraguay seat", amt:t, status:"booked", id:"ticket"});
 const f=FLIGHTS[name];
 if(f!=null){total+=f;breakdown.push({cat:"Flight", note:"yours", amt:f, status:"booked", id:"flight"});}
 else breakdown.push({cat:"Flight", note:"price TBD - add when booked", amt:0, status:"pending", id:"flight"});
 return{total, breakdown};
}

const SW_PROXY="https://soszhnqkxsbamqnqlkgt.supabase.co/functions/v1/sportmonks";

async function fetchSW(path){

const CAT_COLORS={hotels:"#9b6bff",transport:"#5ab0ff",ticket:"#fafafa",flight:"#4ad6c4"};
let _budgetAnim=null;
function animateCount(el,from,to,ms){
 if(_budgetAnim)cancelAnimationFrame(_budgetAnim);
 const t0=performance.now();
 function step(now){
  const k=Math.min(1,(now-t0)/ms);
  const eased=1-Math.pow(1-k,3);
  const v=from+(to-from)*eased;
  const whole=Math.floor(v);
  const cents=Math.round((v-whole)*100).toString().padStart(2,'0');
  el.innerHTML=`$${whole.toLocaleString()}<span class="bcent">.${cents}</span>`;
  if(k<1)_budgetAnim=requestAnimationFrame(step);
 }
 _budgetAnim=requestAnimationFrame(step);
}
function renderBudget(){
 // show + button only in budget mode
 const bp=document.getElementById('bplus');if(bp)bp.classList.remove('gone');
 document.getElementById('bSect1').textContent='YOUR BREAKDOWN';
 const mine=personProjected(ME.name);
 const custom=loadCustom();
 const customTotal=custom.reduce((s,x)=>s+x.amt,0);
 mine.total+=customTotal;
 const hero=document.getElementById('bHero');
 const pendingItems=mine.breakdown.filter(b=>b.status==='pending').length;
 const bookedItems=mine.breakdown.filter(b=>b.status==='booked'&&b.amt>0).length;
 const totalKnown=mine.breakdown.reduce((s,b)=>s+(b.amt||0),0)||1;
 const segs=mine.breakdown.filter(b=>b.amt>0).map(b=>
   `<span class="bseg" style="width:${(b.amt/totalKnown*100).toFixed(2)}%;background:${CAT_COLORS[b.id]||'#e30a17'}"></span>`
 ).join('');
 hero.innerHTML=`<div class="blab">YOUR PROJECTED TOTAL - ${ME.name.toUpperCase()}</div>
   <div class="btot" id="btotNum">$0<span class="bcent">.00</span></div>
   <div class="bbar">${segs}</div>
   <div class="bsub"><span class="bdot"></span>${pendingItems?`<b>${pendingItems} pending</b> · ${bookedItems} booked`:`<b>all ${bookedItems} items booked</b>`} · tap a category</div>`;
 animateCount(document.getElementById('btotNum'),0,mine.total,750);
 document.getElementById('bBreak').innerHTML=mine.breakdown.map(b=>{
   const pct=b.amt?Math.min(100,b.amt/totalKnown*100):0;
   const tap=b.drill?'tappable':'';
   const click=b.drill?`onclick="openBudgetDetail('${b.id}')"`:'';
   return `<div class="bcat ${tap}" ${click}>
    <div class="bci">${CAT_ICON[b.id]||CAT_ICON.hotels}</div>
    <div class="bcm"><b>${b.cat}</b><small>${b.note}</small><span class="bcbar"><i style="width:${pct}%;background:${CAT_COLORS[b.id]||'#e30a17'}"></i></span></div>
    <div class="bcv">${b.amt?money(b.amt):'-'}${b.status==='pending'?'<span class="bpend">ADD PRICE</span>':''}</div>
   </div>`;}).join("");
 // BY CITY section
 const cities=personByCity(ME.name);
 const cityTotal=cities.reduce((s,x)=>s+x.amt,0);
 const cityHTML=cities.map(x=>{
  const pct=cityTotal?(x.amt/cityTotal*100):0;
  return `<div class="bcity"><div class="bcity-l">
    <span class="bcity-d">${x.dates}</span>
    <span class="bcity-n">${x.name}${x.badge?` <span class="bcity-b">${x.badge}</span>`:''}</span>
    <span class="bcity-s">${x.note}</span>
    <span class="bcity-bar"><i style="width:${pct.toFixed(1)}%"></i></span>
   </div>
   <div class="bcity-v">${money(x.amt)}</div></div>`;
 }).join("");
 document.getElementById('bBreak').insertAdjacentHTML('beforeend',
  `<div class="sectitle" style="margin:22px 2px 10px">BY CITY</div>${cityHTML}`);
 if(custom.length){
  const customHTML=custom.map(x=>{
   const ic=(ADD_CATS.find(c=>c.id===x.catId)||{}).svg||CAT_ICON.hotels;
   return `<div class="bcustom">
    <div class="bci">${ic}</div>
    <div class="bcm"><b>${x.name}</b><small>${x.catName} · added by you</small></div>
    <div class="bcv">${money(x.amt)}</div>
    <button class="bx" onclick="deleteCustom(${x.id})" aria-label="remove">×</button>
   </div>`;
  }).join('');
  document.getElementById('bBreak').insertAdjacentHTML('beforeend',
   `<div class="sectitle" style="margin:22px 2px 10px">YOUR ADDITIONS</div>${customHTML}`);
 }
}

/* ===== SPLITWISE VIEW (hero = your balance, breakdown = simplified transactions) ===== */
function renderSplit(){
 const bp=document.getElementById('bplus');if(bp)bp.classList.add('gone');
 const hero=document.getElementById('bHero');
 const br=document.getElementById('bBreak');
 if(!SW_GROUP){
  document.getElementById('bSect1').textContent='SETTLE-UP';
  hero.innerHTML=`<div class="blab">SPLITWISE</div><div class="btot">Loading...</div><div class="bsub">Pulling live</div>`;
  br.innerHTML="";return;
 }
 const members=SW_GROUP.members||[];
 const me=members.find(m=>SW_USER&&m.id===SW_USER.id)||members[0];
 const myBalance=me?(me.balance||[]).reduce((s,b)=>s+parseFloat(b.amount),0):0;
 const owesMe=myBalance>0;
 const debts=SW_GROUP.simplified_debts||[];
 if(Math.abs(myBalance)<0.01){
  hero.innerHTML=`<div class="blab">YOU IN THIS GROUP</div>
   <div class="btot" style="color:#ffd166">${money(0)}</div>
   <div class="bsub">all settled - <b>${SW_GROUP.name}</b></div>`;
 } else if(owesMe){
  hero.innerHTML=`<div class="blab">YOU ARE OWED</div>
   <div class="btot" style="color:#fafafa">${money(myBalance)}</div>
   <div class="bsub">net across the group - <b>${SW_GROUP.name}</b></div>`;
 } else {
  hero.innerHTML=`<div class="blab">YOU OWE</div>
   <div class="btot" style="color:#ff6b6b">${money(myBalance)}</div>
   <div class="bsub">net across the group - <b>${SW_GROUP.name}</b></div>`;
 }
 document.getElementById('bSect1').textContent=debts.length?`${debts.length} TRANSACTION${debts.length>1?'S':''} TO SETTLE`:'ALL CLEAR';
 let html="";
 if(!debts.length){
  html=`<div class="swtx"><div class="swtx-r"><b>Done</b><small>The group is settled.</small></div></div>`;
 }else{
  html=debts.map(d=>{
   const from=members.find(m=>m.id===d.from);const to=members.find(m=>m.id===d.to);
   if(!from||!to)return"";
   const amt=parseFloat(d.amount);
   return `<div class="swtx">
    <div class="swtx-r"><b>${from.first_name} <span class="swtx-ar">→</span> ${to.first_name}</b><small>simplified payment</small></div>
    <div class="swtx-amt">${money(amt)}</div>
   </div>`;}).join("");
 }
 html+=`<div class="swhd">WHERE EVERYONE STANDS</div><div class="swppl">`;
 html+=members.map(m=>{
  const bal=(m.balance||[]).reduce((s,b)=>s+parseFloat(b.amount),0);
  const isYou=SW_USER&&m.id===SW_USER.id;
  let stateLab,stateCol;
  if(Math.abs(bal)<0.01){stateLab='settled';stateCol='#ffd166';}
  else if(bal>0){stateLab='is owed';stateCol='#fafafa';}
  else{stateLab='owes';stateCol='#ff6b6b';}
  return `<div class="swp">
   <div class="swp-l"><b>${m.first_name}${isYou?' <span class="swp-you">YOU</span>':''}</b><small>${stateLab}</small></div>
   <div class="swp-amt" style="color:${stateCol}">${money(bal)}</div>
  </div>`;
 }).join("");
 html+=`</div>`;
 br.innerHTML=html;
}

renderBudget();
