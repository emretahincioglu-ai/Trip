<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>West Coast Run — World Cup (FotMob style)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=Space+Mono:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:#000;color:#fff;overflow:hidden;}
.frame{position:relative;height:100%;max-width:460px;margin:0 auto;display:flex;flex-direction:column;background:#000;}
.scrollarea{flex:1;overflow-y:auto;-ms-overflow-style:none;scrollbar-width:none;}.scrollarea::-webkit-scrollbar{display:none;}
.card{background:#1c1c1e;border-radius:16px;margin:0 12px 12px;overflow:hidden;}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
.hdr .logo{font-weight:900;font-size:22px;letter-spacing:-.02em;display:flex;align-items:center;gap:2px;}
.hdr .logo .b{color:#16e06a;}
.hdr .ctrls{display:flex;gap:8px;}
.hdr .livepill{display:flex;align-items:center;gap:6px;background:#1c1c1e;border-radius:999px;padding:8px 14px;font-size:14px;font-weight:700;}
.hdr .livepill .dot{width:8px;height:8px;border-radius:50%;background:#888;}
.hdr .livepill.on .dot{background:#16e06a;animation:blink 1.2s infinite;}@keyframes blink{50%{opacity:.3}}
.hdr .menu{width:38px;height:38px;border-radius:50%;background:#1c1c1e;display:flex;align-items:center;justify-content:center;font-size:16px;}

/* date tabs */
.datetabs{display:flex;gap:20px;padding:6px 16px 14px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;border-bottom:1px solid #1c1c1e;}.datetabs::-webkit-scrollbar{display:none;}
.dtab{flex:none;font-size:17px;font-weight:700;color:#666;cursor:pointer;white-space:nowrap;padding-bottom:4px;}
.dtab.on{color:#fff;border-bottom:2px solid #16e06a;}

/* group + match rows */
.grouphdr{display:flex;align-items:center;gap:10px;padding:14px 16px 8px;font-weight:800;font-size:16px;}
.grouphdr .ico{font-size:18px;}
.gtag{display:inline-block;background:#2c2c2e;border-radius:8px;padding:5px 11px;font-size:12px;font-weight:700;color:#aaa;margin:0 16px;}
.mrow{display:flex;align-items:center;padding:16px;cursor:pointer;border-bottom:1px solid #141414;}
.mrow:hover{background:#141414;}
.mrow.ours{background:linear-gradient(90deg,#16e06a14,transparent);}
.mrow .side{flex:1;display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;}
.mrow .side.home{justify-content:flex-end;text-align:right;}
.mrow .fl{width:30px;height:30px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;background:#2c2c2e;flex:none;}
.mrow .mid{width:74px;text-align:center;flex:none;}
.mrow .mid .time{font-size:15px;font-weight:700;line-height:1.15;}
.mrow .mid .sc{font-size:20px;font-weight:800;font-family:'Space Mono',monospace;}
.mrow .mid .live{font-size:11px;color:#16e06a;font-weight:700;margin-top:2px;}
.mrow .mid .ft{font-size:10px;color:#666;font-weight:700;margin-top:2px;}

/* DETAIL */
.detail{position:fixed;inset:0;z-index:20;width:100vw;transform:translateY(100%);transition:transform .4s cubic-bezier(.22,1,.36,1);background:#000;display:flex;flex-direction:column;}
.detail.on{transform:translateY(0);}
.detail #detailInner{width:100%;max-width:460px;margin:0 auto;}
.detail .dtop{position:relative;padding:14px 16px 0;background:linear-gradient(180deg,#10243f,#000 75%);}
.detail .dtop.ours{background:linear-gradient(180deg,#0c3a22,#000 75%);}
.dnav{display:flex;align-items:center;justify-content:space-between;}
.dnav .back,.dnav .more{width:40px;height:40px;border-radius:50%;background:#ffffff18;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;}
.dscore{display:flex;align-items:center;justify-content:space-between;padding:16px 8px 18px;}
.dscore .t{flex:1;text-align:center;}
.dscore .t .fl{width:70px;height:70px;border-radius:50%;background:#2c2c2e;font-size:44px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.dscore .t .tn{font-size:16px;font-weight:700;margin-top:8px;}
.dscore .t .rk{font-size:11px;color:#888;background:#ffffff14;display:inline-block;padding:2px 8px;border-radius:999px;margin-top:4px;}
.dscore .mid{padding:0 10px;text-align:center;}
.dscore .mid .big{font-size:34px;font-weight:800;}
.dscore .mid .sc{font-size:44px;font-weight:900;font-family:'Space Mono',monospace;}
.dscore .mid .st{font-size:12px;color:#16e06a;font-weight:700;margin-top:4px;}
.dscore .mid .dd{font-size:12px;color:#888;margin-top:4px;}
.dtabs{display:flex;gap:24px;padding:4px 18px 0;border-bottom:1px solid #1c1c1e;}
.dtab2{font-size:16px;font-weight:700;color:#666;padding-bottom:12px;cursor:pointer;}
.dtab2.on{color:#fff;border-bottom:2px solid #16e06a;}
.dbody{flex:1;overflow-y:auto;-ms-overflow-style:none;scrollbar-width:none;padding-top:14px;}.dbody::-webkit-scrollbar{display:none;}

.sectit{font-size:15px;font-weight:800;padding:4px 4px 12px;}
/* who will win */
.vote{padding:16px;}
.vote .vh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;}
.vote .vh b{font-size:16px;}.vote .vh small{font-size:12px;color:#888;}
.voptions{display:flex;gap:10px;}
.vopt{flex:1;background:#2c2c2e;border:none;border-radius:12px;padding:14px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;color:#fff;font-family:inherit;transition:.15s;position:relative;overflow:hidden;}
.vopt:hover{background:#3a3a3c;}
.vopt .fl{font-size:22px;}.vopt .lbl{font-size:13px;font-weight:700;}
.vopt .barbg{position:absolute;bottom:0;left:0;right:0;height:4px;background:#16e06a;width:var(--p,0%);transition:width .5s;}
.vopt .pct{font-size:11px;color:#16e06a;font-weight:700;}
/* stadium */
.stad{padding:16px;}
.stad .sname{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:700;}
.stad .saddr{font-size:13px;color:#888;margin:2px 0 14px 30px;}
.stad .srow{display:flex;justify-content:space-between;padding-top:12px;border-top:1px solid #2c2c2e;font-size:14px;}
.stad .srow .k{color:#888;}
.stad .weather{display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid #2c2c2e;font-size:14px;}
/* form */
.form{padding:16px;}
.form .frow{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.form .res{font-family:'Space Mono',monospace;font-weight:700;font-size:13px;border-radius:7px;padding:4px 9px;min-width:46px;text-align:center;}
.form .res.w{background:#16331f;color:#36d97a;}.form .res.d{background:#33310f;color:#d9c736;}.form .res.l{background:#3a1518;color:#ff6b6b;}
.form .opp{font-size:14px;color:#ccc;display:flex;align-items:center;gap:8px;}
/* table */
.tbl{padding:6px 0 16px;}
.tbl .thead,.tbl .trow{display:grid;grid-template-columns:20px 1fr 24px 24px 24px 24px 30px;gap:3px;align-items:center;padding:10px 14px;font-size:13px;}
.tbl .thead{font-size:11px;color:#888;font-weight:700;}
.tbl .trow{border-top:1px solid #161616;}
.tbl .trow .tm{display:flex;align-items:center;gap:6px;font-weight:600;min-width:0;overflow:hidden;}
.tbl .trow .tm span:last-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tbl .trow .tm .fl{font-size:16px;flex:none;}
.tbl .trow .pos{color:#888;font-family:'Space Mono',monospace;}
.tbl .trow .num{text-align:center;color:#bbb;font-family:'Space Mono',monospace;}
.tbl .trow .pts{text-align:center;font-weight:800;font-family:'Space Mono',monospace;}
.tbl .trow.us{background:#16e06a0e;}
.tbl .trow .bar{width:3px;height:24px;border-radius:2px;flex:none;}
/* events timeline */
.tl{padding:8px 16px 16px;}
.tlrow{display:flex;align-items:center;gap:10px;padding:9px 0;position:relative;}
.tlrow.away{flex-direction:row-reverse;text-align:right;}
.tlrow .mn{font-family:'Space Mono',monospace;font-size:12px;color:#888;width:34px;}
.tlrow .ic{font-size:15px;}
.tlrow .tx{font-size:14px;flex:1;}
.tlrow.goal .tx{font-weight:700;}
/* stats bars */
.mstats{padding:10px 16px 20px;}
.srowx{margin-bottom:14px;}
.srowx .l{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
.srowx .l b{font-family:'Space Mono',monospace;}
.srowx .bar{height:6px;border-radius:3px;background:#2c2c2e;display:flex;overflow:hidden;}
.srowx .bar .a{background:#3a7afe;}.srowx .bar .b{background:#16e06a;}

/* team page */
.teampage{position:fixed;inset:0;z-index:25;width:100vw;transform:translateY(100%);transition:transform .4s cubic-bezier(.22,1,.36,1);background:#000;display:flex;flex-direction:column;}
.teampage.on{transform:translateY(0);}
.teampage #teamInner{width:100%;max-width:460px;margin:0 auto;}
.tphead{padding:14px 16px 0;}
.tphero{display:flex;align-items:center;gap:14px;padding:14px 4px 16px;}
.tphero .fl{width:64px;height:64px;border-radius:50%;background:#2c2c2e;font-size:38px;display:flex;align-items:center;justify-content:center;}
.tphero .tn{font-size:26px;font-weight:800;}
.tphero .rk{font-size:12px;color:#888;background:#ffffff14;display:inline-block;padding:3px 10px;border-radius:999px;margin-top:4px;}
.tptabs{display:flex;gap:22px;padding:0 16px;border-bottom:1px solid #1c1c1e;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none;}.tptabs::-webkit-scrollbar{display:none;}
.tpt{font-size:16px;font-weight:700;color:#666;padding-bottom:12px;cursor:pointer;white-space:nowrap;}
.tpt.on{color:#fff;border-bottom:2px solid #16e06a;}
.tpbody{flex:1;overflow-y:auto;-ms-overflow-style:none;scrollbar-width:none;padding-top:12px;}.tpbody::-webkit-scrollbar{display:none;}
.nextm{padding:16px;}
.nextm .nh{font-size:15px;font-weight:800;margin-bottom:12px;}
.nextm .nrow{display:flex;align-items:center;justify-content:center;gap:14px;}
.nextm .nrow .fl{font-size:26px;}.nextm .nrow .tm{font-size:15px;font-weight:600;}.nextm .nrow .tt{font-family:'Space Mono',monospace;font-size:13px;color:#16e06a;}
.squad .pos-h{font-size:13px;font-weight:800;color:#888;padding:14px 16px 8px;letter-spacing:.04em;text-transform:uppercase;}
.pl-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-top:1px solid #141414;}
.pl-row .ph{width:42px;height:42px;border-radius:50%;background:linear-gradient(180deg,#e8b58c,#c98f68);flex:none;}
.pl-row .nm{flex:1;}.pl-row .nm b{font-size:15px;}.pl-row .nm small{font-size:12px;color:#888;display:flex;align-items:center;gap:5px;}
.pl-row .ag{font-size:15px;font-weight:700;color:#bbb;}
.pl-row .no{font-size:13px;color:#666;font-family:'Space Mono',monospace;width:22px;}

.tabs{flex:none;display:flex;background:#000;border-top:1px solid #1c1c1e;padding:8px 6px calc(8px + env(safe-area-inset-bottom));}
.tabb{flex:1;background:none;border:none;color:#666;padding:6px 2px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;}.tabb.on{color:#16e06a;}.tabb .ic{font-size:18px;}
.tabs,.tabb{display:none !important;} body .frame .tabs{display:none !important;}</style>

<div class="frame">
  <div class="scrollarea">
    <div class="hdr">
      <div class="logo">🏆 World<span class="b">Cup</span></div>
      <div class="ctrls"><div class="livepill on" id="livePill"><span class="dot"></span>Live</div><div class="menu">☰</div></div>
    </div>
    <div class="datetabs" id="datetabs"></div>
    <div id="matchlist"></div>
  </div>

  <div class="tabs">
    <button class="tabb"><span class="ic">🛣️</span>Trip</button>
    <button class="tabb on"><span class="ic">⚽</span>World Cup</button>
    <button class="tabb"><span class="ic">🎮</span>Games</button>
    <button class="tabb"><span class="ic">👤</span>You</button>
  </div>
</div>

<!-- MATCH DETAIL -->
<div class="detail" id="detail"><div id="detailInner" style="display:flex;flex-direction:column;height:100%;min-height:0"></div></div>
<!-- TEAM PAGE -->
<div class="teampage" id="teampage"><div id="teamInner" style="display:flex;flex-direction:column;height:100%;min-height:0"></div></div>

<script>
const DAYS=[{lbl:"Sat 13 Jun",k:"s13"},{lbl:"Sun 14 Jun",k:"s14"},{lbl:"Fri 19 Jun",k:"f19"},{lbl:"Thu 25 Jun",k:"t25"}];
const TEAM={
 TUR:{n:"Türkiye",fl:"🇹🇷",rank:22,coach:"Vincenzo Montella",stadium:"Atatürk Olimpiyat Stadı",
   form:[["W","2-0","Bulgaria","🇧🇬"],["D","2-2","Spain","🇪🇸"],["W","1-0","Romania","🇷🇴"],["W","0-1","Kosovo","🇽🇰"],["W","4-0","N. Macedonia","🇲🇰"]],
   squad:{Keepers:[["1","Mert Günok","Fenerbahçe",37],["12","Altay Bayındır","Man United",28],["23","Uğurcan Çakır","Galatasaray",30]],
    Defenders:[["3","Merih Demiral","Al-Ahli",28],["4","Çağlar Söyüncü","Fenerbahçe",30],["2","Zeki Çelik","AS Roma",29],["","Mustafa Eskihellaç","Trabzonspor",29]],
    Midfielders:[["8","Hakan Çalhanoğlu","Inter",32],["6","Orkun Kökçü","Benfica",25],["15","Arda Güler","Real Madrid",21],["","İsmail Yüksek","Fenerbahçe",26]],
    Forwards:[["10","Kenan Yıldız","Juventus",21],["7","Kerem Aktürkoğlu","Benfica",27],["9","Burak Yılmaz","—",41]]}},
 PAR:{n:"Paraguay",fl:"🇵🇾",rank:54,coach:"Gustavo Alfaro",stadium:"Estadio Defensores"},
 AUS:{n:"Australia",fl:"🇦🇺",rank:27,coach:"Tony Popovic",stadium:"—"},
 USA:{n:"USA",fl:"🇺🇸",rank:16,coach:"—",stadium:"—"},
 MEX:{n:"Mexico",fl:"🇲🇽",rank:14},RSA:{n:"South Africa",fl:"🇿🇦",rank:62},
 GER:{n:"Germany",fl:"🇩🇪",rank:10},CUR:{n:"Curaçao",fl:"🇨🇼",rank:88},
 CIV:{n:"Ivory Coast",fl:"🇨🇮",rank:40},ECU:{n:"Ecuador",fl:"🇪🇨",rank:23},
 NED:{n:"Netherlands",fl:"🇳🇱",rank:7},JPN:{n:"Japan",fl:"🇯🇵",rank:17},
};
const GROUP_D=[["AUS",0],["PAR",0],["TUR",0],["USA",0]];
const MATCHES={
 s13:[{id:1,grp:"GROUP A",h:"MEX",a:"RSA",status:"final",sc:[3,0]}],
 s14:[
  {id:2,grp:"GROUP D",ours:true,h:"AUS",a:"TUR",status:"up",time:"12:00 AM",dd:"13 days",stadium:"BC Place Vancouver"},
  {id:3,grp:"GROUP E",h:"GER",a:"CUR",status:"up",time:"1:00 PM"},
  {id:4,grp:"GROUP E",h:"CIV",a:"ECU",status:"up",time:"7:00 PM"},
  {id:5,grp:"GROUP F",h:"NED",a:"JPN",status:"up",time:"4:00 PM"},
 ],
 f19:[{id:6,grp:"GROUP D",ours:true,h:"TUR",a:"PAR",status:"up",time:"11:00 PM",dd:"Fri Jun 19",stadium:"Levi's Stadium"}],
 t25:[{id:7,grp:"GROUP D",ours:true,h:"TUR",a:"USA",status:"up",time:"10:00 PM",dd:"Thu Jun 25"}],
};
let day="s14";

const dtabs=document.getElementById('datetabs');
DAYS.forEach(d=>{const el=document.createElement('div');el.className='dtab'+(d.k===day?' on':'');el.textContent=d.lbl;el.onclick=()=>{day=d.k;document.querySelectorAll('.dtab').forEach(x=>x.classList.remove('on'));el.classList.add('on');renderList();};dtabs.appendChild(el);});

function teamName(c){return TEAM[c]?.n||c;}function teamFl(c){return TEAM[c]?.fl||"⚪";}
function mrow(m){const live=m.status==="live",fin=m.status==="final";
 const mid=live?`<div class="sc">${m.sc[0]}-${m.sc[1]}</div><div class="live">● ${m.min||"LIVE"}</div>`
  :fin?`<div class="sc">${m.sc[0]}-${m.sc[1]}</div><div class="ft">FT</div>`
  :`<div class="time">${(m.time||"").replace(' ','<br>')}</div>`;
 return `<div class="mrow ${m.ours?'ours':''}" onclick="openDetail(${m.id})">
  <div class="side home"><span>${teamName(m.h)}</span><span class="fl">${teamFl(m.h)}</span></div>
  <div class="mid">${mid}</div>
  <div class="side away"><span class="fl">${teamFl(m.a)}</span><span>${teamName(m.a)}</span></div></div>`;}
function renderList(){const list=MATCHES[day]||[];
 // group by grp
 const groups={};list.forEach(m=>{(groups[m.grp]=groups[m.grp]||[]).push(m);});
 let html=`<div class="grouphdr"><span class="ico">🏆</span>FIFA World Cup</div>`;
 Object.keys(groups).forEach(g=>{html+=`<div class="gtag">${g}</div>`+groups[g].map(mrow).join("");});
 document.getElementById('matchlist').innerHTML=html;
}
renderList();

// flatten lookup
function findMatch(id){for(const k in MATCHES){const m=MATCHES[k].find(x=>x.id===id);if(m)return m;}return null;}

let detailTab="preview",curMatch=null;
function openDetail(id){curMatch=findMatch(id);detailTab="preview";drawDetail();document.getElementById('detail').classList.add('on');}
function closeDetail(){document.getElementById('detail').classList.remove('on');}
window.openDetail=openDetail;window.closeDetail=closeDetail;

function drawDetail(){const m=curMatch;const H=TEAM[m.h],A=TEAM[m.a];const live=m.status==="live",fin=m.status==="final";
 const midScore=live?`<div class="sc">${m.sc[0]} - ${m.sc[1]}</div><div class="st">● ${m.min||'LIVE'}</div>`:fin?`<div class="sc">${m.sc[0]} - ${m.sc[1]}</div><div class="st" style="color:#888">FULL TIME</div>`:`<div class="big">${m.time||''}</div><div class="dd">${m.dd||''}</div>`;
 const tabs=["Preview","Table","Lineups","Stats"];
 let inner=`<div class="dtop ${m.ours?'ours':''}">
   <div class="dnav"><div class="back" onclick="closeDetail()">‹</div><div class="more">⋯</div></div>
   <div class="dscore">
     <div class="t" onclick="openTeam('${m.h}')"><div class="fl">${teamFl(m.h)}</div><div class="tn">${teamName(m.h)}</div>${H?.rank?`<div class="rk">FIFA #${H.rank}</div>`:''}</div>
     <div class="mid">${midScore}</div>
     <div class="t" onclick="openTeam('${m.a}')"><div class="fl">${teamFl(m.a)}</div><div class="tn">${teamName(m.a)}</div>${A?.rank?`<div class="rk">FIFA #${A.rank}</div>`:''}</div>
   </div>
   <div class="dtabs">${tabs.map(t=>`<div class="dtab2 ${t.toLowerCase()===detailTab?'on':''}" onclick="setDetailTab('${t.toLowerCase()}')">${t}</div>`).join("")}</div>
 </div><div class="dbody" id="dbody"></div>`;
 document.getElementById('detailInner').innerHTML=inner;drawDetailBody();
}
function setDetailTab(t){detailTab=t;document.querySelectorAll('.dtab2').forEach(x=>x.classList.toggle('on',x.textContent.toLowerCase()===t));drawDetailBody();}
window.setDetailTab=setDetailTab;
function drawDetailBody(){const m=curMatch;const b=document.getElementById('dbody');let h="";
 if(detailTab==="preview"){
  // who will win vote (demo percentages)
  h+=`<div class="card"><div class="vote"><div class="vh"><b>Who will win?</b><small>6,431 votes</small></div><div class="voptions">
   <button class="vopt" style="--p:34%"><span class="fl">${teamFl(m.h)}</span><span class="lbl">${teamName(m.h)}</span><span class="pct">34%</span><div class="barbg"></div></button>
   <button class="vopt" style="--p:28%"><span class="lbl">Draw</span><span class="pct">28%</span><div class="barbg"></div></button>
   <button class="vopt" style="--p:38%"><span class="fl">${teamFl(m.a)}</span><span class="lbl">${teamName(m.a)}</span><span class="pct">38%</span><div class="barbg"></div></button>
  </div></div></div>`;
  // stadium
  if(m.stadium)h+=`<div class="card"><div class="stad"><div class="sname">🏟️ ${m.stadium}</div><div class="saddr">FIFA World Cup 2026 · Round 1</div><div class="srow"><span class="k">Capacity</span><span>54,000</span></div><div class="srow"><span class="k">Surface</span><span>Grass</span></div><div class="weather">⛅ 18°C · Partly Cloudy</div></div></div>`;
  // both teams' recent form (use home if available)
  const F=TEAM[m.h]?.form;if(F)h+=`<div class="card"><div class="form"><div class="sectit">${teamName(m.h)} · recent form</div>${F.map(f=>`<div class="frow"><span class="res ${f[0].toLowerCase()}">${f[1]}</span><span class="opp">${f[3]} ${f[2]}</span></div>`).join("")}</div></div>`;
 }
 else if(detailTab==="table"){
  h+=`<div class="card"><div class="grouphdr" style="padding:14px 16px 4px"><span class="ico">🏆</span>${m.grp}</div><div class="tbl"><div class="thead"><span></span><span>Team</span><span>PL</span><span>W</span><span>D</span><span>L</span><span>PTS</span></div>${GROUP_D.map((t,i)=>`<div class="trow ${t[0]===m.h||t[0]===m.a?'us':''}"><span class="pos">${i+1}</span><span class="tm"><span class="bar" style="background:${i<2?'#16e06a':'#444'}"></span><span class="fl">${teamFl(t[0])}</span>${teamName(t[0])}</span><span class="num">0</span><span class="num">0</span><span class="num">0</span><span class="num">0</span><span class="pts">0</span></div>`).join("")}</div></div>`;
 }
 else if(detailTab==="lineups"){
  if(m.status==="up")h+=`<div class="card"><div style="padding:30px 16px;text-align:center;color:#888;font-size:14px">Lineups announced ~1 hour before kickoff.</div></div>`;
  else h+=`<div class="card"><div style="padding:30px 16px;text-align:center;color:#888;font-size:14px">Lineups appear here once confirmed.</div></div>`;
 }
 else if(detailTab==="stats"){
  if(m.status==="up")h+=`<div class="card"><div style="padding:30px 16px;text-align:center;color:#888;font-size:14px">Match stats go live at kickoff — possession, shots, cards & more.</div></div>`;
 }
 b.innerHTML=h;
}

// team page
let teamTab="overview",curTeam=null;
function openTeam(c){if(!TEAM[c])return;curTeam=c;teamTab="overview";drawTeam();document.getElementById('teampage').classList.add('on');}
function closeTeam(){document.getElementById('teampage').classList.remove('on');}
window.openTeam=openTeam;window.closeTeam=closeTeam;
function drawTeam(){const T=TEAM[curTeam];const tabs=T.squad?["Overview","Matches","Table","Squad"]:["Overview","Matches","Table"];
 let inner=`<div class="tphead"><div class="dnav"><div class="back" onclick="closeTeam()">‹</div><div class="more" onclick="closeTeam()">✕</div></div>
   <div class="tphero"><div class="fl">${T.fl}</div><div><div class="tn">${T.n}</div><div class="rk">FIFA #${T.rank}</div></div></div>
   <div class="tptabs">${tabs.map(t=>`<div class="tpt ${t.toLowerCase()===teamTab?'on':''}" onclick="setTeamTab('${t.toLowerCase()}')">${t}</div>`).join("")}</div></div>
  <div class="tpbody" id="tpbody"></div>`;
 document.getElementById('teamInner').innerHTML=inner;drawTeamBody();
}
function setTeamTab(t){teamTab=t;document.querySelectorAll('.tpt').forEach(x=>x.classList.toggle('on',x.textContent.toLowerCase()===t));drawTeamBody();}
window.setTeamTab=setTeamTab;
function drawTeamBody(){const T=TEAM[curTeam];const b=document.getElementById('tpbody');let h="";
 if(teamTab==="overview"){
  h+=`<div class="card"><div class="nextm"><div class="nh">Next match</div><div class="nrow"><span class="tm">${T.n}</span><span class="fl">${T.fl}</span><span class="tt">JUN 19</span><span class="fl">🇵🇾</span><span class="tm">Paraguay</span></div></div></div>`;
  if(T.form)h+=`<div class="card"><div class="form"><div class="sectit">Team form</div>${T.form.map(f=>`<div class="frow"><span class="res ${f[0].toLowerCase()}">${f[1]}</span><span class="opp">${f[3]} ${f[2]}</span></div>`).join("")}</div></div>`;
  if(T.coach)h+=`<div class="card"><div class="stad"><div class="sname">👔 ${T.coach}</div><div class="saddr">Head coach</div></div></div>`;
  if(T.stadium&&T.stadium!=="—")h+=`<div class="card"><div class="stad"><div class="sname">🏟️ ${T.stadium}</div><div class="srow"><span class="k">Surface</span><span>Grass</span></div><div class="srow"><span class="k">Capacity</span><span>76,092</span></div></div></div>`;
 }
 else if(teamTab==="squad"&&T.squad){
  h+=`<div class="card squad">`;Object.keys(T.squad).forEach(pos=>{h+=`<div class="pos-h">${pos}</div>`+T.squad[pos].map(p=>`<div class="pl-row"><span class="no">${p[0]||'–'}</span><div class="ph"></div><div class="nm"><b>${p[1]}</b><small>${p[2]}</small></div><div class="ag">${p[3]}</div></div>`).join("");});h+=`</div>`;
 }
 else if(teamTab==="table"){
  h+=`<div class="card"><div class="grouphdr" style="padding:14px 16px 4px"><span class="ico">🏆</span>FIFA World Cup · Grp. D</div><div class="tbl"><div class="thead"><span></span><span>Team</span><span>PL</span><span>W</span><span>D</span><span>L</span><span>PTS</span></div>${GROUP_D.map((t,i)=>`<div class="trow ${t[0]===curTeam?'us':''}"><span class="pos">${i+1}</span><span class="tm"><span class="bar" style="background:${i<2?'#16e06a':'#444'}"></span><span class="fl">${teamFl(t[0])}</span>${teamName(t[0])}</span><span class="num">0</span><span class="num">0</span><span class="num">0</span><span class="num">0</span><span class="pts">0</span></div>`).join("")}</div></div>`;
 }
 else h+=`<div class="card"><div style="padding:30px 16px;text-align:center;color:#888;font-size:14px">${teamTab.charAt(0).toUpperCase()+teamTab.slice(1)} — coming with live data.</div></div>`;
 b.innerHTML=h;
}
</script>
