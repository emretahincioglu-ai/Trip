<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>World Cup Trip — Scores</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=DM+Sans:wght@400;600;700;800&family=Space+Mono:wght@700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:#25060e;color:#fff;overflow:hidden;}
.frame{position:relative;height:100%;max-width:460px;margin:0 auto;display:flex;flex-direction:column;background:#25060e;}
.scroll{flex:1;overflow-y:auto;-ms-overflow-style:none;scrollbar-width:none;padding:0 0 30px;}
.scroll::-webkit-scrollbar{display:none;}
.hero{position:relative;padding:calc(max(env(safe-area-inset-top,0px),60px) + 18px) 18px 22px;background:linear-gradient(160deg,#3a0e16 0%,#28141a 60%,#1f0f12 100%);border-bottom:1px solid #e30a1733;overflow:hidden;}
.hero::before{content:'';position:absolute;top:-40%;right:-30%;width:280px;height:280px;background:radial-gradient(circle,#e30a1733 0%,transparent 65%);pointer-events:none;}
.hero .badge{display:inline-flex;align-items:center;gap:7px;background:#e30a17;color:#fff;font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.22em;font-weight:800;padding:5px 11px;border-radius:999px;position:relative;z-index:1;}
.hero .badge .dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:hpulse 1.4s infinite;}
@keyframes hpulse{0%,100%{opacity:1;}50%{opacity:.35;}}
.hero h1{font-family:'Inter',-apple-system,sans-serif;font-weight:900;font-size:32px;letter-spacing:-.025em;line-height:.95;margin:11px 0 6px;position:relative;z-index:1;color:#fff;}
.hero .sub{font-family:'Space Mono',monospace;font-size:11px;color:#ffffffb0;letter-spacing:.12em;position:relative;z-index:1;}
.hero .dates{margin-top:9px;font-size:12.5px;color:#fff;position:relative;z-index:1;display:inline-flex;align-items:center;gap:8px;background:#ffffff0c;border:1px solid #ffffff14;padding:5px 12px;border-radius:999px;}
.tabs2{display:flex;gap:4px;padding:14px 14px 6px;background:#25060e;position:sticky;top:0;z-index:5;border-bottom:1px solid #ffffff0a;}
.tab2{flex:1;background:none;border:none;color:#ffffff70;font-family:'Inter',sans-serif;font-weight:700;font-size:12.5px;padding:11px 6px;border-radius:10px;cursor:pointer;transition:.2s;letter-spacing:.02em;}
.tab2.on{background:#e30a17;color:#fff;}
.tab2:not(.on):hover{background:#ffffff08;color:#fff;}
.pane{display:none;padding:16px 16px 30px;animation:pin .25s ease;}
.pane.on{display:block;}
@keyframes pin{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.sec{font-size:11px;letter-spacing:.22em;color:#ffffff80;font-weight:800;margin:18px 2px 10px;}
.sec:first-child{margin-top:0;}
.flag-img{width:22px;height:16px;object-fit:cover;border-radius:2px;display:inline-block;box-shadow:0 1px 3px #0006;vertical-align:middle;background:#ffffff10;}
.group{background:#3a0e16;border:1px solid #ffffff14;border-radius:16px;overflow:hidden;margin-bottom:12px;box-shadow:0 4px 14px #0006;}
.ghd{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:linear-gradient(135deg,#4a1418,#3a0e16);border-bottom:1px solid #ffffff10;}
.ghd b{font-family:'Inter',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.01em;}
.ghd small{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:#ffffff80;font-weight:700;}
.gtable{width:100%;border-collapse:collapse;}
.gtable th{font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.12em;color:#ffffff80;font-weight:700;text-align:right;padding:9px 4px;background:#28141a;}
.gtable th:first-child{text-align:left;padding-left:12px;width:22px;}
.gtable th:nth-child(2){text-align:left;padding-left:6px;}
.gtable th:last-child{padding-right:14px;}
.gtable td{padding:11px 4px;font-size:12.5px;text-align:right;border-top:1px solid #ffffff08;font-family:'Space Mono',monospace;font-weight:700;color:#fff;}
.gtable td:first-child{text-align:left;padding-left:12px;color:#ffffff90;font-size:11.5px;width:22px;}
.gtable td:nth-child(2){text-align:left;padding-left:6px;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;}
.gtable td:nth-child(2) .teamn{display:inline-flex;align-items:center;gap:7px;}
.gtable td:nth-child(2) .teamn .tname{max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle;}
.gtable .gd.pos{color:#4ad6c4;}
.gtable .gd.neg{color:#ff6b6b;}
.gtable .pts{color:#fff;font-family:'Inter',sans-serif;font-weight:900;font-size:13.5px;padding-right:14px;}
.gtable tr.us{background:linear-gradient(90deg,#e30a1722,#e30a1700);}
.gtable tr.us td:first-child{color:#e30a17;font-weight:800;}
.gtable tr.p1 td:first-child{color:#ffd166;}
.gtable tr.p2 td:first-child{color:#cfd8e3;}
.daysrow{display:flex;gap:8px;overflow-x:auto;padding:0 2px 14px;-ms-overflow-style:none;scrollbar-width:none;}
.daysrow::-webkit-scrollbar{display:none;}
.daychip{flex:none;padding:8px 14px;background:#3a0e16;border:1px solid #ffffff14;border-radius:999px;font-size:12.5px;font-weight:700;color:#ffffffc0;cursor:pointer;transition:.15s;font-family:'Inter',sans-serif;letter-spacing:.02em;text-align:center;line-height:1.15;}
.daychip.on{background:#e30a17;border-color:#e30a17;color:#fff;}
.daychip small{display:block;font-family:'Space Mono',monospace;font-size:8.5px;letter-spacing:.08em;color:#ffffff80;font-weight:700;margin-top:1px;}
.daychip.on small{color:#ffffffd0;}
.fixlist{display:flex;flex-direction:column;gap:8px;}
.fix{background:#3a0e16;border:1px solid #ffffff14;border-radius:14px;padding:13px 16px;display:flex;align-items:center;gap:10px;transition:.15s;}
.fix:hover{border-color:#e30a1755;}
.fix .ft{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0;}
.fix .team{display:flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;min-width:0;}
.fix .team .tname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;}
.fix .score{font-family:'Inter',sans-serif;font-weight:900;font-size:18px;letter-spacing:-.01em;min-width:48px;text-align:center;color:#fff;}
.fix .score.tbd{color:#ffffff50;font-size:13px;font-weight:600;}
.fix .meta{font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.06em;color:#ffffff80;font-weight:700;text-align:right;min-width:54px;max-width:90px;line-height:1.4;}
.fix .meta b{display:block;font-size:10.5px;color:#fff;font-weight:800;}
.fix.us{border-color:#e30a17;background:linear-gradient(90deg,#e30a1722,#3a0e16 50%);}
.fix.us .meta b{color:#e30a17;}
.fix.live{border-color:#e30a17;background:linear-gradient(90deg,#e30a1722,#3a0e16 40%);}
.fix.live .meta b::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:#e30a17;margin-right:5px;animation:hpulse 1.2s infinite;}
/* === Bracket — FotMob style === */
.brsubtabs{display:flex;gap:6px;overflow-x:auto;padding:0 0 14px;margin:0 -2px 4px;-ms-overflow-style:none;scrollbar-width:none;}
.brsubtabs::-webkit-scrollbar{display:none;}
.brsub{flex:none;padding:8px 16px;background:#ffffff10;border:1px solid #ffffff14;border-radius:999px;font-size:13px;font-weight:700;color:#ffffffc0;cursor:pointer;transition:.15s;font-family:'Inter',sans-serif;letter-spacing:.01em;}
.brsub.on{background:#fff;color:#1a0c0e;border-color:#fff;}
.brsub:hover:not(.on){background:#ffffff18;color:#fff;}
.brkrnd{display:none;}
.brkrnd.on{display:block;}
.brc{background:#3a0e16;border:1px solid #ffffff14;border-radius:12px;margin-bottom:10px;display:flex;align-items:stretch;overflow:hidden;cursor:pointer;transition:transform .12s,border-color .15s;}
.brc:hover{border-color:#ffffff28;}
.brc:active{transform:scale(.99);}
.brc .bar{width:4px;flex:none;}
.brc .body{flex:1;padding:13px 16px 13px 14px;display:flex;align-items:center;justify-content:space-between;gap:14px;min-width:0;}
.brc .left{flex:1;min-width:0;}
.brc .venue{font-size:11.5px;color:#ffffffc8;margin-bottom:9px;font-weight:600;display:flex;align-items:center;gap:6px;}
.brc .venue svg{width:12px;height:12px;flex:none;}
.brc .slot{display:flex;align-items:center;gap:10px;padding:4px 0;font-size:14px;color:#fff;font-weight:700;}
.brc .slot .slotdot{width:18px;height:18px;border-radius:50%;background:#ffffff14;border:1.5px solid #ffffff22;flex:none;}
.brc .slot .stxt{font-family:'Space Mono',monospace;letter-spacing:.04em;}
.brc .right{text-align:right;font-family:'Space Mono',monospace;font-size:11px;color:#ffffff90;font-weight:700;line-height:1.45;flex:none;letter-spacing:.03em;}
.brc .right b{display:block;font-size:11.5px;color:#fff;font-weight:800;letter-spacing:.04em;}
.brc.us{border-color:#e30a17;}
.brc.us .bar{background:#e30a17 !important;}
.brkstg{margin-bottom:18px;}
.brkhd{display:flex;align-items:center;justify-content:space-between;margin:0 2px 10px;}
.brkhd b{font-family:'Inter',sans-serif;font-weight:900;font-size:16px;letter-spacing:-.01em;}
.brkhd small{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;color:#ffd166;font-weight:700;}
.brkrow{display:flex;flex-direction:column;gap:6px;}
.brkmatch{background:#3a0e16;border:1px solid #ffffff14;border-radius:10px;padding:10px 13px;display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:12px;}
.brkmatch .l{flex:1;color:#ffffffc0;font-weight:700;}
.brkmatch .l span{display:block;font-family:'Space Mono',monospace;font-size:9.5px;color:#ffffff70;font-weight:700;letter-spacing:.04em;margin-top:1px;}
.brkmatch .r{font-family:'Space Mono',monospace;font-size:10px;color:#ffffff70;font-weight:700;letter-spacing:.06em;}
.stats-card{background:#3a0e16;border:1px solid #ffffff14;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.stats-card .sci{width:36px;height:36px;border-radius:10px;background:#e30a1722;border:1px solid #e30a1755;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;}
.stats-card b{display:block;font-size:14px;font-weight:700;}
.stats-card small{display:block;font-size:11.5px;color:#ffffff90;margin-top:2px;}
.loading{text-align:center;padding:40px 20px;color:#ffffff70;font-size:13px;}
.loading::before{content:'';display:inline-block;width:18px;height:18px;border:2px solid #ffffff20;border-top-color:#e30a17;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:9px;}
@keyframes spin{to{transform:rotate(360deg)}}
.errmsg{background:#3a0e16;border:1px solid #e30a17;border-radius:12px;padding:14px;color:#ff8a90;font-size:12px;text-align:center;}
</style>
<div class="frame">
 <div class="scroll">
  <div class="hero">
   
   <h1>FIFA World Cup<br>2026</h1>
   <div class="sub">USA · CANADA · MEXICO</div>
   <div class="dates" id="heroDates">📅 Jun 11 → Jul 19</div>
  </div>
  <div class="tabs2">
   <button class="tab2 on" data-pane="today">Today</button>
   <button class="tab2" data-pane="fixtures">Fixtures</button>
   <button class="tab2" data-pane="groups">Groups</button>
   <button class="tab2" data-pane="ko">Bracket</button>
  </div>
  <div class="pane on" id="pane-today"><div class="loading">Pulling live tournament data...</div></div>
  <div class="pane" id="pane-fixtures"><div class="loading">Loading fixtures...</div></div>
  <div class="pane" id="pane-groups"><div class="loading">Loading group tables...</div></div>
  <div class="pane" id="pane-ko"></div>
 </div>
</div>
<script>
/* ===== SportMonks proxy ===== */
const SM_PROXY="https://soszhnqkxsbamqnqlkgt.supabase.co/functions/v1/sportmonks";
const WC_SEASON=26618;   // FIFA World Cup 2026 season
const WC_LEAGUE=732;     // FIFA World Cup league
const STAGE_GROUP=77478590, STAGE_R32=77479086, STAGE_R16=77479087, STAGE_QF=77479088, STAGE_SF=77479089, STAGE_F=77479090;
const TR_NAME_RX=/T(ü|u)rkiye|Turkey/i;

async function smFetch(path){
 const url=`${SM_PROXY}?path=${encodeURIComponent(path)}`;
 const r=await fetch(url);
 if(!r.ok)throw new Error(`SM ${r.status}`);
 return r.json();
}

/* short display names for long countries */
const SHORT_NAMES={
 "United States":"USA","United States of America":"USA",
 "Korea Republic":"S. Korea","South Korea":"S. Korea","Republic of Korea":"S. Korea",
 "Czech Republic":"Czechia",
 "Bosnia and Herzegovina":"Bosnia","Bosnia & Herz.":"Bosnia","Bosnia & Herzegovina":"Bosnia",
 "South Africa":"S. Africa",
 "Saudi Arabia":"Saudi","United Arab Emirates":"UAE",
 "Costa Rica":"C. Rica","Cote D'Ivoire":"Ivory Coast",
 "New Zealand":"N. Zealand","Cape Verde":"Cape Verde",
 "DR Congo":"DR Congo","Democratic Republic of the Congo":"DR Congo",
 "United Kingdom":"England","England":"England","Türkiye":"Türkiye","Turkey":"Türkiye",
};
function shortName(n){return SHORT_NAMES[n]||n;}

/* ===== Data caches ===== */
let STANDINGS=null, FIXTURES=null;

function flagImg(url,name){
 if(!url)return '<span class="flag-img"></span>';
 return `<img class="flag-img" src="${url}" alt="${name||''}" loading="lazy">`;
}
function shortDate(d){const x=new Date(d);return x.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function shortTime(d){const x=new Date(d);return x.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/Los_Angeles'});}

async function loadStandings(){
 try{
  const r=await smFetch(`standings/seasons/${WC_SEASON}?include=participant;group;details.type`);
  const arr=r.data||[];
  /* Group by group_id / group.name */
  const out={};
  arr.forEach(s=>{
   const gname=(s.group&&s.group.name)||'Unknown';
   if(!out[gname])out[gname]=[];
   const det={};
   (s.details||[]).forEach(d=>{
    const t=(d.type&&(d.type.name||d.type.code))||String(d.type_id);
    det[t]=d.value;
   });
   const num=k=>{const v=det[k];return typeof v==='number'?v:parseInt(v)||0;};
   const p=num('Matches Played')||num('overall_played')||0;
   const w=num('Wins')||num('overall_won')||0;
   const dr=num('Draws')||num('overall_draw')||0;
   const l=num('Losses')||num('overall_lost')||0;
   const gf=num('Goals For')||num('overall_goals_for')||0;
   const ga=num('Goals Against')||num('overall_goals_against')||0;
   const gd=num('Goal Difference')||num('overall_goal_difference')||(gf-ga);
   const rawName=(s.participant&&s.participant.name)||'?';
   out[gname].push({
    pos:s.position||0,
    name:shortName(rawName),
    flag:(s.participant&&(s.participant.image_path||s.participant.country_image_path))||'',
    p,w,d:dr,l,gd,
    pts:s.points||num('Points')||0,
    us:TR_NAME_RX.test(rawName)
   });
  });
  /* sort each group by position */
  Object.keys(out).forEach(g=>out[g].sort((a,b)=>a.pos-b.pos));
  STANDINGS=out;
 }catch(e){console.warn('standings fail',e);STANDINGS={};}
}

async function loadFixtures(){
 try{
  /* season fixtures with participants, stage, venue, state, scores */
  const r=await smFetch(`fixtures?filters=fixtureSeasons:${WC_SEASON}&include=participants;stage;venue;state;scores&per_page=200&sortBy=starting_at`);
  const arr=r.data||[];
  FIXTURES=arr.map(f=>{
   const teams=f.participants||[];
   const home=teams.find(t=>t.meta&&t.meta.location==='home')||teams[0]||{};
   const away=teams.find(t=>t.meta&&t.meta.location==='away')||teams[1]||{};
   /* compute score from scores array if present */
   let score=null;
   if(Array.isArray(f.scores)&&f.scores.length){
    const sh=f.scores.find(s=>s.score&&s.description==='CURRENT'&&(s.score.participant==='home'||s.participant_id===home.id));
    const sa=f.scores.find(s=>s.score&&s.description==='CURRENT'&&(s.score.participant==='away'||s.participant_id===away.id));
    if(sh&&sa)score=`${sh.score.goals}-${sa.score.goals}`;
   }
   const st=f.state&&(f.state.short_name||f.state.name);
   const isLive=st==='LIVE'||st==='1H'||st==='2H'||st==='HT';
   const isFt=st==='FT'||st==='AET'||st==='PEN';
   const stageName=(f.stage&&f.stage.name)||'';
   const venueName=(f.venue&&((f.venue.name||'')+(f.venue.city_name?' · '+f.venue.city_name:'')))||'';
   const cityOnly=(f.venue&&(f.venue.city_name||f.venue.name||''))||'';
   const us=TR_NAME_RX.test(home.name||'')||TR_NAME_RX.test(away.name||'');
   return {
    id:f.id,
    starts:f.starting_at,
    d:shortDate(f.starting_at),
    time:shortTime(f.starting_at),
    a:home.name,af:home.image_path,
    b:away.name,bf:away.image_path,
    g:stageName,venue:venueName,city:cityOnly,
    score, live:isLive, ft:isFt, status:isLive?'LIVE':(isFt?'FT':stageName.replace(/Group Stage/i,'GROUP STAGE')),
    us
   };
  });
 }catch(e){console.warn('fixtures fail',e);FIXTURES=[];}
}

/* ===== Renderers ===== */
function fixHTML(f){
 const cls=`${f.us?'us':''} ${f.live?'live':''}`;
 const score=f.score||(f.ft?'FT':'- : -');
 const scClass=f.score?'':'tbd';
 const a=shortName(f.a||'TBD'), b=shortName(f.b||'TBD');
 return `<div class="fix ${cls}">
  <div class="ft">
   <div class="team">${flagImg(f.af,a)}<span class="tname">${a}</span></div>
   <div class="team">${flagImg(f.bf,b)}<span class="tname">${b}</span></div>
  </div>
  <div class="score ${scClass}">${score}</div>
  <div class="meta"><b>${f.status||''}</b>${f.time}<br>${f.city||''}</div>
 </div>`;
}

/* ===== Tab switching ===== */
function setPane(p){
 document.querySelectorAll('.tab2').forEach(x=>x.classList.toggle('on',x.dataset.pane===p));
 document.querySelectorAll('.pane').forEach(x=>x.classList.toggle('on',x.id==='pane-'+p));
}
document.addEventListener('click',function(e){
 const t=e.target.closest('.tab2');if(!t)return;
 e.preventDefault();
 setPane(t.dataset.pane);
},true);

function renderToday(){
 const host=document.getElementById('pane-today');
 if(!FIXTURES){host.innerHTML='<div class="loading">Pulling live tournament data...</div>';return;}
 const now=Date.now();
 const upcoming=FIXTURES.filter(f=>new Date(f.starts).getTime()>=now-3*3600*1000).slice(0,5);
 const live=FIXTURES.filter(f=>f.live);
 let html='';
 if(live.length){
  html+=`<div class="sec">LIVE NOW · ${live.length}</div><div class="fixlist">${live.map(fixHTML).join('')}</div>`;
 }
 html+=`<div class="sec">UPCOMING · NEXT ${upcoming.length}</div>
  <div class="fixlist">${upcoming.length?upcoming.map(fixHTML).join(''):'<div class="loading" style="padding:14px">No upcoming fixtures yet.</div>'}</div>`;
 host.innerHTML=html;
}

function renderFixtures(){
 const host=document.getElementById('pane-fixtures');
 if(!FIXTURES){host.innerHTML='<div class="loading">Loading fixtures...</div>';return;}
 if(!FIXTURES.length){host.innerHTML='<div class="errmsg">No fixtures returned from API. Check the proxy/season ID.</div>';return;}
 const days=[...new Set(FIXTURES.map(f=>f.d))];
 const dayChips=days.map((d,i)=>{
  const [mo,da]=d.split(' ');
  return `<button class="daychip ${i===0?'on':''}" data-day="${d}">${da}<small>${mo}</small></button>`;
 }).join('');
 host.innerHTML=`<div class="sec">PICK A DAY · ${FIXTURES.length} matches</div>
  <div class="daysrow">${dayChips}</div>
  <div class="fixlist" id="fxlist"></div>`;
 function show(d){
  const list=FIXTURES.filter(f=>f.d===d);
  document.getElementById('fxlist').innerHTML=list.length?list.map(fixHTML).join(''):'<div class="loading" style="padding:20px">No matches on this day.</div>';
 }
 host.querySelectorAll('.daychip').forEach(c=>c.onclick=()=>{
   host.querySelectorAll('.daychip').forEach(x=>x.classList.toggle('on',x===c));
   show(c.dataset.day);
 });
 show(days[0]);
}

function renderGroups(){
 const host=document.getElementById('pane-groups');
 if(!STANDINGS){host.innerHTML='<div class="loading">Loading group tables...</div>';return;}
 const keys=Object.keys(STANDINGS).sort();
 if(!keys.length){host.innerHTML='<div class="errmsg">No standings returned from API.</div>';return;}
 let html=`<div class="sec">${keys.length} GROUPS · LIVE TABLE</div>`;
 keys.forEach(g=>{
  const teams=STANDINGS[g];
  const totP=teams.reduce((s,t)=>s+(t.p||0),0);
  html+=`<div class="group">
   <div class="ghd"><b>${g}</b><small>${totP/2|0} / 6 played</small></div>
   <table class="gtable">
    <thead><tr><th>#</th><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>PTS</th></tr></thead>
    <tbody>${teams.map((t,i)=>{
     const us=t.us?'us':'';
     const gdc=t.gd>0?'pos':(t.gd<0?'neg':'');
     const gd=t.gd>0?`+${t.gd}`:t.gd;
     return `<tr class="${us} p${i+1}"><td>${t.pos||i+1}</td><td><span class="teamn">${flagImg(t.flag,t.name)}<span class="tname">${t.name}</span></span></td><td>${t.p}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td class="gd ${gdc}">${gd}</td><td class="pts">${t.pts}</td></tr>`;
    }).join('')}</tbody>
   </table>
  </div>`;
 });
 host.innerHTML=html;
}
